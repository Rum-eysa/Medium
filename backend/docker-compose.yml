version: '3.9'

# Firebase cloud'da oldugu icin yerel DB container'a gerek yok.
# Tek servis: FastAPI

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projem-api
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      # service-account.json'u container icine salt-okunur bagla
      # FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase ile de yapilabilir
      - ./service-account.json:/app/service-account.json:ro
      # Gelistirme sirasinda kod degisikliklerini aninda yansit
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Ileride BERT / video servisi eklemek icin ornek (simdilik yorum satiri)
  # nlp:
  #   build: ./services/nlp
  #   ports: ['8001:8001']
  #   restart: unless-stopped
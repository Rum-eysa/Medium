version: '3.9'

# Production override — gelistirme volume mount'u kaldirilir,
# sadece service-account.json mount edilir.
# Kullanim: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  api:
    volumes:
      - ./service-account.json:/app/service-account.json:ro
    environment:
      - DEBUG=False
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --proxy-headers
      --forwarded-allow-ips '*'
    restart: always